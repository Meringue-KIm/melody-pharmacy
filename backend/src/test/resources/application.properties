spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

jwt.secret=test-secret-key-for-unit-tests-must-be-long-enough-256bits
jwt.expiration=86400000

kakao.client-id=test-kakao-client-id
kakao.redirect-uri=http://localhost/test

gemini.api-key=test-gemini-key
youtube.api-key=test-youtube-key

admin.secret-key=test-admin-secret

song-pool.target-size=10
song-pool.min-views-to-keep=1000
song-pool.grace-period-days=30
