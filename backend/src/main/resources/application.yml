spring:
  datasource:
    url: jdbc:mysql://localhost:3306/melody_pharmacy?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: DB_PASSWORD_REMOVED
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

jwt:
  secret: JWT_SECRET_REMOVED
  expiration: 86400000  # 24시간 (밀리초)

kakao:
  client-id: KAKAO_CLIENT_ID_REMOVED
  redirect-uri: http://localhost:5173/oauth/kakao

gemini:
  api-key: GEMINI_API_KEY_REMOVED

youtube:
  api-key: YOUTUBE_API_KEY_REMOVED

song-pool:
  target-size: 100
  min-views-to-keep: 1000000   # 100만 뷰 미만이면 제거 후보
  grace-period-days: 30        # 추가 후 이 기간은 제거 안 함
