spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/melody_pharmacy?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/oauth/kakao}

gemini:
  api-key: ${GEMINI_API_KEY}

youtube:
  api-key: ${YOUTUBE_API_KEY}

song-pool:
  target-size: 100
  min-views-to-keep: 1000000
  grace-period-days: 30

admin:
  secret-key: ${ADMIN_SECRET_KEY}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
